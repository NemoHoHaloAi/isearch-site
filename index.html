        <div class="flex gap-4">

            <p class="text-slate-600" data-zh="按下全局快捷键（默认 Shift + Space），类 Alfred 的搜索框会从屏幕顶部弹出。" data-en="Press the global shortcut (default: Shift + Space) to open the Alfred-style search bar at the top of your screen."></p>

          </div>
        </div>
      </div>

  <script>
    // i18n: switch between zh and en by setting data-i18n attribute on <html>
    let currentLang = 'zh';

    function applyLang() {
      const html = document.documentElement;
      html.setAttribute('lang', currentLang === 'zh' ? 'zh-CN' : 'en');
      document.querySelectorAll('[data-zh][data-en]').forEach(function (el) {
        el.innerHTML = el.getAttribute('data-' + currentLang);
      });
    }

    document.getElementById('lang-toggle').addEventListener('click', function () {
      currentLang = currentLang === 'zh' ? 'en' : 'zh';
      applyLang();
    });

    // Apply on load
    applyLang();
  </script>
